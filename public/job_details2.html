    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
 @media screen and (max-width: 768px) {

  }

    height: 20%;

    flex-grow: 1; /* Allow button container to take remaining space */

    width: 25%; /* Auto width based on content */
    min-width: 100px;
    padding: px;

    background-color;

}

.Sub_4b img {
  position: absolute;
  max-width: 100%;
  margin-top: 0%;

  bottom: 90px;

</head>
<body>
    <div class="S1">
        <div class="S1-a">
            <img src="Views/CLUB_LOGO-2.png" alt="Club Logo" >
        </div>

        <div class="S1-b">
            <nav>
                <a href="Home.html.html">PLACEMENT</a>
                <a href="home-1.html">HELP</a>
            </nav>
        </div>
    </div>

    <div class="Part_4">
        <div class="Sub_4-1">
            <div class="Sub_4a">
                <a href="#">
                    <h1 id="companyName">Loading...</h1>                
                    <p id="jobTitle">Loading...</p>
                    <pre id="jobSummary">Loading...</pre>
                </a>
                <hr>
                <pre id="jobStats">Loading...</pre>
            </div>

            <div class="Sub_4b">
                <div class="Sub_4bimg">
                    <img id="companyLogo" src="comp_logo.png" alt="Company Logo" class="company-logo">
                </div>
                <div class="Sub_4bbut">
                <button id="applyButton">Apply</button>
                </div>
            </div>           
        </div>
    </div>
    
    <div class="Part_5">
        <h1>Job Description</h1>
        <hr>
        <div class="Sub_5-1">
            <label>Job Title : </label><span id="JT">Loading...</span><br><br>
            <label>Company : </label><span id="Company">Loading...</span><br><br>
            <label>Location : </label><span id="Location">Loading...</span><br><br>
            <label>Duration : </label><span id="Duration">Loading...</span><br><br>
            <label>About Company : </label><br><span id="AC">Loading...</span><br><br>
            <label>Responsibilities : </label><span id="Responsibilities">Loading...</span><br><br>
            <label>Requirements : </label><span id="Requirements">Loading...</span><br><br>
            <label>Benefits : </label><span id="Benifit">Loading...</span><br><br>
        </div>
    </div>

    <script>
            // Utility function to get URL parameters
function getUrlParameter(name) {
    name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
    var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
    var results = regex.exec(location.search);
    return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
}

// Execute when the document is fully loaded
document.addEventListener('DOMContentLoaded', function() {
    // Job ID from URL
    const jobId = getUrlParameter('id');
    if (!jobId) {
        console.error('No job ID found in URL');
        alert('No job ID specified. Redirecting to jobs page.');
        window.location.href = 'index.html';
        return;
    }

    console.log('Loading job details for ID:', jobId);

    // Default job table
    const jobTable = 'job1'; // Change based on which jobs page you're viewing

    // Set up apply button handler
    const applyButton = document.getElementById('applyButton');
    if (applyButton) {
        applyButton.addEventListener('click', submitJobApplication);
    } else {
        console.error('Apply button not found in the DOM');
    }

    // Check if user is logged in
    function checkLoginStatus() {
        console.log('Checking login status...');
        return fetch('/api/user', {
            method: 'GET',
            credentials: 'include' // Include cookies
        })
        .then(response => {
            console.log('Login status response:', response.status);
            if (response.ok) {
                return response.json().then(data => {
                    if (data.success && data.user) {
                        console.log('User is logged in:', data.user.id);
                        localStorage.setItem('userId', data.user.id);
                        return data.user.id;
                    }
                    console.log('User not logged in');
                    return null;
                });
            }
            console.log('Failed to check login status');
            return null;
        })
        .catch((error) => {
            console.error('Error checking login status:', error);
            // Fall back to localStorage if session check fails
            return localStorage.getItem('userId');
        });
    }

    // Check if user has already applied for this job
    function checkApplicationStatus(userId) {
        if (!userId) return Promise.resolve(false);
        
        console.log('Checking application status for user:', userId);
        return fetch(`/api/application-status?userId=${userId}&jobId=${jobId}&jobTable=${jobTable}`, {
            credentials: 'include' // Include cookies
        })
        .then(response => response.json())
        .then(data => {
            console.log('Application status:', data);
            if (data.hasApplied) {
                const applyButton = document.getElementById('applyButton');
                if (applyButton) {
                    applyButton.textContent = 'Applied';
                    applyButton.disabled = true;
                }
            }
            return data.hasApplied;
        })
        .catch(error => {
            console.error('Error checking application status:', error);
            return false;
        });
    }

    // Function to submit job application
    function submitJobApplication() {
        checkLoginStatus().then(userId => {
            if (!userId) {
                alert('Please log in to apply for this job');
                // Save current page URL to return after login
                localStorage.setItem('returnTo', window.location.href);
                window.location.href = '/login';
                return;
            }
            
            console.log('Submitting job application...');
            fetch('/api/apply', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    jobId: jobId,
                    jobTable: jobTable
                }),
                credentials: 'include' // Include cookies
            })
            .then(response => {
                console.log('Application submission response:', response.status);
                if (!response.ok) {
                    if (response.status === 401) {
                        // Session expired or not logged in
                        alert('Your session has expired. Please log in again.');
                        localStorage.setItem('returnTo', window.location.href);
                        window.location.href = '/login';
                        throw new Error('Not logged in');
                    }
                    return response.json().then(data => {
                        throw new Error(data.message || 'Application failed');
                    });
                }
                return response.json();
            })
            .then(data => {
                console.log('Application submission data:', data);
                if (data.success) {
                    alert('Application submitted successfully!');
                    const applyButton = document.getElementById('applyButton');
                    if (applyButton) {
                        applyButton.textContent = 'Applied';
                        applyButton.disabled = true;
                    }
                } else {
                    alert(data.message || 'Failed to submit application. Please try again.');
                }
            })
            .catch(error => {
                if (error.message !== 'Not logged in') {
                    console.error('Error submitting application:', error);
                    alert('Failed to submit application: ' + error.message);
                }
            });
        });
    }

    // Load job details
    console.log('Fetching job details...');
    fetch(`/api/jobs2/${jobId}`, {
        credentials: 'include' // Include cookies
    })
    .then(response => {
        console.log('Job details response:', response.status);
        if (!response.ok) {
            throw new Error('Job not found');
        }
        return response.json();
    })
    .then(job => {
        console.log('Job details received:', job);
        // Update page with job details
        document.title = `${job.title} at ${job.company}`;
        
        // Update text content for all elements
        const elements = {
            'companyName': job.company,
            'jobTitle': job.title,
            'jobSummary': `Industry - ${job.industry}  |  Stipend - ${job.stipend} | ${job.location}`,
            'jobStats': `Openings - ${job.openings}                        Applications - ${job.applications}`,
            'JT': job.title,
            'Company': job.company,
            'Location': job.location,
            'Duration': job.duration,
            'AC': job.about_company,
            'Responsibilities': job.responsibilities,
            'Requirements': job.requirements,
            'Benifit': job.benefits
        };
        
        // Update each element if it exists
        for (const [id, text] of Object.entries(elements)) {
            const element = document.getElementById(id);
            if (element) {
                element.textContent = text;
            } else {
                console.warn(`Element with ID '${id}' not found`);
            }
        }
        
        // Handle the company logo
        const companyLogoElement = document.getElementById('companyLogo');
        if (companyLogoElement) {
            // Use the endpoint for serving logos
            companyLogoElement.src = `/api/companyLogo/job2/${job.id}`;
            companyLogoElement.alt = `${job.company} Logo`;
            // Add error handler to use default logo if fetching fails
            companyLogoElement.onerror = function() {
                this.src = 'comp_logo.png';
                console.log('Failed to load logo for', job.company);
            };
        } else {
            console.warn('Company logo element not found in the DOM');
        }
        
        // Check application status after loading job details
        return checkLoginStatus().then(checkApplicationStatus);
    })
    .catch(error => {
        console.error('Error fetching job data:', error);
        alert('Failed to load job details. Please try again later.');
        window.location.href = 'index.html';
    });
});
    </script>
